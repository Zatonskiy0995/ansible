---
# Настройки контейнера и БД
awg_container_name: amnezia-awg2
awg_sqlite_db_path: /opt/amnezia/awg/awg.db
awg_table_name: clientsTable

# Названия колонок в таблице clientsTable (при необходимости поменяй под свою схему)
awg_column_client: client_name
awg_column_rx_bytes: rx_bytes
awg_column_tx_bytes: tx_bytes
awg_column_local_subnet: local_subnet

# SQL возвращает готовые markdown-строки, отсортированные по суммарному трафику
awg_sql_query: >-
  SELECT
    COALESCE({{ awg_column_client }}, 'unknown') || ' | ' ||
    ROUND(COALESCE({{ awg_column_rx_bytes }}, 0) / 1048576.0, 2) || ' | ' ||
    ROUND(COALESCE({{ awg_column_tx_bytes }}, 0) / 1048576.0, 2) || ' | ' ||
    ROUND((COALESCE({{ awg_column_rx_bytes }}, 0) + COALESCE({{ awg_column_tx_bytes }}, 0)) / 1048576.0, 2) || ' | ' ||
    COALESCE({{ awg_column_local_subnet }}, 'n/a')
  FROM {{ awg_table_name }}
  ORDER BY (COALESCE({{ awg_column_rx_bytes }}, 0) + COALESCE({{ awg_column_tx_bytes }}, 0)) DESC;

# Куда сохранить markdown-отчет
awg_report_dir: "{{ playbook_dir }}/../reports"
awg_report_output: "{{ playbook_dir }}/../reports/clients_traffic_report.md"

# Временный путь на хосте для fallback, если в контейнере нет sqlite3
awg_tmp_db_path: /tmp/awg_clients_report.db
