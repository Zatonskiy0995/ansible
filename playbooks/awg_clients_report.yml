---
- name: Build AWG clients traffic report from clientsTable
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - ../vars/awg_report.yml

  tasks:
    - name: Ensure reports directory exists
      ansible.builtin.file:
        path: "{{ awg_report_dir }}"
        state: directory
        mode: "0755"

    - name: Check target container is running
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - -f
          - "{{ '{{.State.Running}}' }}"
          - "{{ awg_container_name }}"
      register: container_state
      changed_when: false
      failed_when: container_state.rc != 0 or (container_state.stdout | trim) != 'true'

    - name: Find SQLite DB file in container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sh
          - -lc
          - |
            # Функция проверки SQLite формата
            is_sqlite_file() {
              [ -f "$1" ] && head -c 16 "$1" 2>/dev/null | grep -q '^SQLite format 3'
            }

            # Сначала проверим заданный путь
            if is_sqlite_file "{{ awg_sqlite_db_path }}"; then
              echo "{{ awg_sqlite_db_path }}"
              exit 0
            fi

            # Если это .conf файл, ищем в нём путь к БД
            if echo "{{ awg_sqlite_db_path }}" | grep -q '\.conf$'; then
              DB_FROM_CONF=$(grep -Eo '/[^"[:space:]]+\.(db|sqlite)' "{{ awg_sqlite_db_path }}" 2>/dev/null | head -n1 || true)
              if [ -n "$DB_FROM_CONF" ] && is_sqlite_file "$DB_FROM_CONF"; then
                echo "$DB_FROM_CONF"
                exit 0
              fi
            fi

            # Ищем в стандартных каталогах
            for DIRNAME in /opt/amnezia/awg /opt/amnezia /etc/amnezia; do
              [ -d "$DIRNAME" ] || continue
              while IFS= read -r FOUND; do
                if is_sqlite_file "$FOUND"; then
                  echo "$FOUND"
                  exit 0
                fi
              done < <(find "$DIRNAME" -maxdepth 3 -type f \( -name '*.db' -o -name '*.sqlite' \) 2>/dev/null)
            done

            echo "ERROR: No SQLite database found" >&2
            exit 1
      register: db_path_result
      changed_when: false

    - name: Fail if database not found
      ansible.builtin.fail:
        msg: "SQLite database not found in container {{ awg_container_name }}"
      when: db_path_result.rc != 0

    - name: Set database path
      ansible.builtin.set_fact:
        awg_db_container_path: "{{ db_path_result.stdout | trim }}"

    - name: Copy database from container to host
      ansible.builtin.command:
        argv:
          - docker
          - cp
          - "{{ awg_container_name }}:{{ awg_db_container_path }}"
          - "{{ awg_tmp_db_path }}"
      changed_when: true

    - name: Query clientsTable data from database
      ansible.builtin.shell:
        cmd: "sqlite3 '{{ awg_tmp_db_path }}' \"{{ awg_sql_query }}\""
      register: awg_query
      changed_when: false

    - name: Render markdown report
      ansible.builtin.copy:
        content: |
          # Отчет по клиентам AWG

          - Контейнер: {{ awg_container_name }}
          - Таблица: {{ awg_table_name }}
          - Сформирован: {{ ansible_date_time.iso8601 }}

          ## Детализация

          | Клиент | Потратил (RX, MiB) | Отдал (TX, MiB) | Всего (MiB) | Локальная подсеть |
          |---|---:|---:|---:|---|
          {% for row in awg_query.stdout_lines %}
          | {{ row }} |
          {% endfor %}
        dest: "{{ awg_report_output }}"
        mode: "0644"

    - name: Cleanup temporary database file
      ansible.builtin.file:
        path: "{{ awg_tmp_db_path }}"
        state: absent

    - name: Show report location
      ansible.builtin.debug:
        msg: "✓ Отчет сформирован: {{ awg_report_output }} (БД: {{ awg_db_container_path }})"
