---
- name: Build AWG clients traffic report from clientsTable
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - ../vars/awg_report.yml

  tasks:
    - name: Ensure reports directory exists
      ansible.builtin.file:
        path: "{{ awg_report_dir }}"
        state: directory
        mode: "0755"

    - name: Check target container is running
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - -f
          - "{{ '{{.State.Running}}' }}"
          - "{{ awg_container_name }}"
      register: container_state
      changed_when: false
      failed_when: container_state.rc != 0 or (container_state.stdout | trim) != 'true'

    - name: Read clientsTable data from sqlite inside container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sqlite3
          - "{{ awg_sqlite_db_path }}"
          - "{{ awg_sql_query }}"
      register: awg_query
      changed_when: false

    - name: Render markdown report
      ansible.builtin.copy:
        content: |
          # Отчет по клиентам AWG

          - Контейнер: {{ awg_container_name }}
          - Таблица: {{ awg_table_name }}
          - Сформирован: {{ ansible_date_time.iso8601 }}

          ## Детализация

          | Клиент | Потратил (RX, MiB) | Отдал (TX, MiB) | Всего (MiB) | Локальная подсеть |
          |---|---:|---:|---:|---|
          {% for row in awg_query.stdout_lines %}
          | {{ row }} |
          {% endfor %}
        dest: "{{ awg_report_output }}"
        mode: "0644"

    - name: Show report location
      ansible.builtin.debug:
        msg: "Report generated: {{ awg_report_output }}"
