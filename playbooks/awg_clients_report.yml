---
- name: Build AWG clients traffic report from clientsTable
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - ../vars/awg_report.yml

  tasks:
    - name: Ensure reports directory exists
      ansible.builtin.file:
        path: "{{ awg_report_output | dirname }}"
        state: directory
        mode: "0755"

    - name: Check target container is running
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - -f
          - "{{ '{{.State.Running}}' }}"
          - "{{ awg_container_name }}"
      register: container_state
      changed_when: false
      failed_when: container_state.rc != 0 or (container_state.stdout | trim) != 'true'

    - name: Read clientsTable data from sqlite inside container (JSON)
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sqlite3
          - -json
          - "{{ awg_sqlite_db_path }}"
          - "{{ awg_sql_query }}"
      register: awg_query
      changed_when: false

    - name: Parse query result
      ansible.builtin.set_fact:
        awg_clients_raw: "{{ (awg_query.stdout | trim | length > 0) | ternary(awg_query.stdout | from_json, []) }}"

    - name: Init enriched clients list
      ansible.builtin.set_fact:
        awg_clients_enriched: []

    - name: Enrich clients with totals and MiB values
      ansible.builtin.set_fact:
        awg_clients_enriched: "{{ awg_clients_enriched + [ {
          'client': (item.client | default('unknown')),
          'rx_bytes': (item.rx_bytes | default(0) | int),
          'tx_bytes': (item.tx_bytes | default(0) | int),
          'total_bytes': ((item.rx_bytes | default(0) | int) + (item.tx_bytes | default(0) | int)),
          'rx_mib': (((item.rx_bytes | default(0) | int) / 1048576) | round(2)),
          'tx_mib': (((item.tx_bytes | default(0) | int) / 1048576) | round(2)),
          'total_mib': ((((item.rx_bytes | default(0) | int) + (item.tx_bytes | default(0) | int)) / 1048576) | round(2)),
          'local_subnet': (item.local_subnet | default('n/a'))
        } ] }}"
      loop: "{{ awg_clients_raw }}"

    - name: Sort clients by total traffic descending
      ansible.builtin.set_fact:
        awg_clients_sorted: "{{ awg_clients_enriched | sort(attribute='total_bytes', reverse=true) }}"

    - name: Render markdown report
      ansible.builtin.template:
        src: ../templates/clients_traffic_report.md.j2
        dest: "{{ awg_report_output }}"
        mode: "0644"

    - name: Show report location
      ansible.builtin.debug:
        msg: "Report generated: {{ awg_report_output }}"
