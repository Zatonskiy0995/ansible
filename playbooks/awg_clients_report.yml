---
- name: Build AWG clients traffic report from clientsTable
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - ../vars/awg_report.yml

  tasks:
    - name: Ensure reports directory exists
      ansible.builtin.file:
        path: "{{ awg_report_dir }}"
        state: directory
        mode: "0755"

    - name: Check target container is running
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - -f
          - "{{ '{{.State.Running}}' }}"
          - "{{ awg_container_name }}"
      register: container_state
      changed_when: false
      failed_when: container_state.rc != 0 or (container_state.stdout | trim) != 'true'

    - name: Check sqlite3 exists inside container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sh
          - -lc
          - command -v sqlite3
      register: sqlite3_in_container
      changed_when: false
      failed_when: false

    - name: Resolve effective sqlite DB path inside container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sh
          - -lc
          - |
            is_sqlite_file() {
              [ -f "$1" ] && head -c 16 "$1" 2>/dev/null | grep -q '^SQLite format 3'
            }

            TARGET="{{ awg_sqlite_db_path }}"
            case "$TARGET" in
              *.db|*.sqlite)
                if is_sqlite_file "$TARGET"; then
                  echo "$TARGET"
                  exit 0
                fi
                echo "$TARGET"
                ;;
              *.conf)
                DB_FROM_CONF=$(grep -Eo '/[^"[:space:]]+\.(db|sqlite)' "$TARGET" 2>/dev/null | head -n1 || true)
                if [ -n "$DB_FROM_CONF" ] && is_sqlite_file "$DB_FROM_CONF"; then
                  echo "$DB_FROM_CONF"
                  exit 0
                else
                  for DIRNAME in "$(dirname "$TARGET")" /opt/amnezia/awg /opt/amnezia /etc/amnezia; do
                    [ -d "$DIRNAME" ] || continue
                    while IFS= read -r FOUND; do
                      if is_sqlite_file "$FOUND"; then
                        echo "$FOUND"
                        exit 0
                      fi
                    done < <(find "$DIRNAME" -maxdepth 3 -type f \( -name '*.db' -o -name '*.sqlite' \) 2>/dev/null)
                  done
                fi
                ;;
              *)
                echo "$TARGET"
                ;;
            esac

            # Фолбэк: если явно заданный путь невалидный, пробуем найти любой SQLite в стандартных каталогах
            for DIRNAME in /opt/amnezia/awg /opt/amnezia /etc/amnezia; do
              [ -d "$DIRNAME" ] || continue
              while IFS= read -r FOUND; do
                if is_sqlite_file "$FOUND"; then
                  echo "$FOUND"
                  exit 0
                fi
              done < <(find "$DIRNAME" -maxdepth 3 -type f \( -name '*.db' -o -name '*.sqlite' \) 2>/dev/null)
            done

            # Если не нашли, вернем исходное значение для явной диагностики
            echo "$TARGET"
      register: awg_effective_db_path_cmd
      changed_when: false

    - name: Set effective sqlite DB path
      ansible.builtin.set_fact:
        awg_effective_db_path: "{{ awg_effective_db_path_cmd.stdout | trim }}"

    - name: Read clientsTable data via sqlite3 inside container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sqlite3
          - "{{ awg_effective_db_path }}"
          - "{{ awg_sql_query }}"
      register: awg_query
      changed_when: false
      when: sqlite3_in_container.rc == 0

    - name: Find and list all potential DB files in container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sh
          - -lc
          - |
            {
              [ -n "{{ awg_effective_db_path }}" ] && echo "{{ awg_effective_db_path }}"
              [ -n "{{ awg_sqlite_db_path }}" ] && echo "{{ awg_sqlite_db_path }}"
              for d in /opt/amnezia /opt /var/lib /etc; do
                [ -d "$d" ] || continue
                find "$d" -maxdepth 6 -type f \( -name '*.db' -o -name '*.sqlite' -o -name '*.sqlite3' \) 2>/dev/null || true
              done
            } | awk 'NF' | sort -u
      register: awg_db_candidates
      changed_when: false
      when: sqlite3_in_container.rc != 0

    - name: Read clientsTable data via host python sqlite3 (fallback)
      ansible.builtin.shell: |
        #!/bin/bash
        set -o pipefail

        CONTAINER="{{ awg_container_name }}"
        CANDIDATES='{{ awg_db_candidates.stdout_lines | join("\n") if sqlite3_in_container.rc != 0 else "" }}'
        SQL_QUERY='{{ awg_sql_query }}'

        FOUND=0
        while IFS= read -r DB_PATH; do
          [ -z "$DB_PATH" ] && continue
          TMP="/tmp/awg_test_$$.db"
          
          if docker cp "$CONTAINER:$DB_PATH" "$TMP" 2>/dev/null; then
            # Проверяем валидность и наличие таблицы
            if python3 -c "import sqlite3; c=sqlite3.connect('$TMP'); c.cursor().execute('SELECT 1 FROM clientsTable LIMIT 1'); c.close()" 2>/dev/null; then
              # Выполняем запрос
              python3 -c "import sqlite3; c=sqlite3.connect('$TMP'); [print(r[0]) for r in c.cursor().execute('''$SQL_QUERY''')]; c.close()"
              FOUND=1
              rm -f "$TMP"
              break
            fi
            rm -f "$TMP"
          fi
        done <<< "$CANDIDATES"

        if [ "$FOUND" -eq 0 ]; then
          echo "ERROR: No valid SQLite DB with clientsTable found" >&2
          exit 1
        fi
      args:
        executable: /bin/bash
      register: awg_query
      changed_when: false
      when: sqlite3_in_container.rc != 0

    - name: Render markdown report
      ansible.builtin.copy:
        content: |
          # Отчет по клиентам AWG

          - Контейнер: {{ awg_container_name }}
          - Таблица: {{ awg_table_name }}
          - Сформирован: {{ ansible_date_time.iso8601 }}

          ## Детализация

          | Клиент | Потратил (RX, MiB) | Отдал (TX, MiB) | Всего (MiB) | Локальная подсеть |
          |---|---:|---:|---:|---|
          {% for row in awg_query.stdout_lines %}
          | {{ row }} |
          {% endfor %}
        dest: "{{ awg_report_output }}"
        mode: "0644"

    - name: Show report location
      ansible.builtin.debug:
        msg: "Report generated: {{ awg_report_output }} (DB: {{ awg_effective_db_path }})"
