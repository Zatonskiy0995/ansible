---
- name: Build AWG clients traffic report from clientsTable
  hosts: localhost
  connection: local
  gather_facts: true

  vars_files:
    - ../vars/awg_report.yml

  tasks:
    - name: Ensure reports directory exists
      ansible.builtin.file:
        path: "{{ awg_report_dir }}"
        state: directory
        mode: "0755"

    - name: Check target container is running
      ansible.builtin.command:
        argv:
          - docker
          - inspect
          - -f
          - "{{ '{{.State.Running}}' }}"
          - "{{ awg_container_name }}"
      register: container_state
      changed_when: false
      failed_when: container_state.rc != 0 or (container_state.stdout | trim) != 'true'

    - name: Check sqlite3 exists inside container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sh
          - -lc
          - command -v sqlite3
      register: sqlite3_in_container
      changed_when: false
      failed_when: false

    - name: Resolve effective sqlite DB path inside container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sh
          - -lc
          - |
            TARGET="{{ awg_sqlite_db_path }}"
            case "$TARGET" in
              *.db|*.sqlite)
                echo "$TARGET"
                ;;
              *.conf)
                DB_FROM_CONF=$(grep -Eo '/[^"[:space:]]+\.(db|sqlite)' "$TARGET" 2>/dev/null | head -n1 || true)
                if [ -n "$DB_FROM_CONF" ]; then
                  echo "$DB_FROM_CONF"
                else
                  DIRNAME=$(dirname "$TARGET")
                  FOUND=$(find "$DIRNAME" -maxdepth 2 -type f \( -name '*.db' -o -name '*.sqlite' \) 2>/dev/null | head -n1 || true)
                  if [ -n "$FOUND" ]; then
                    echo "$FOUND"
                  else
                    echo "$TARGET"
                  fi
                fi
                ;;
              *)
                echo "$TARGET"
                ;;
            esac
      register: awg_effective_db_path_cmd
      changed_when: false

    - name: Set effective sqlite DB path
      ansible.builtin.set_fact:
        awg_effective_db_path: "{{ awg_effective_db_path_cmd.stdout | trim }}"

    - name: Read clientsTable data via sqlite3 inside container
      ansible.builtin.command:
        argv:
          - docker
          - exec
          - "{{ awg_container_name }}"
          - sqlite3
          - "{{ awg_effective_db_path }}"
          - "{{ awg_sql_query }}"
      register: awg_query
      changed_when: false
      when: sqlite3_in_container.rc == 0

    - name: Copy sqlite DB from container to host (fallback)
      ansible.builtin.command:
        argv:
          - docker
          - cp
          - "{{ awg_container_name }}:{{ awg_effective_db_path }}"
          - "{{ awg_tmp_db_path }}"
      register: awg_db_copy
      changed_when: true
      when: sqlite3_in_container.rc != 0

    - name: Read clientsTable data via host python sqlite3 (fallback)
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - "import sqlite3,sys; conn=sqlite3.connect(sys.argv[1]); cur=conn.cursor(); [print(r[0]) for r in cur.execute(sys.argv[2])]; conn.close()"
          - "{{ awg_tmp_db_path }}"
          - "{{ awg_sql_query }}"
      register: awg_query
      changed_when: false
      when: sqlite3_in_container.rc != 0

    - name: Remove temporary DB copy (fallback)
      ansible.builtin.file:
        path: "{{ awg_tmp_db_path }}"
        state: absent
      when: sqlite3_in_container.rc != 0

    - name: Render markdown report
      ansible.builtin.copy:
        content: |
          # Отчет по клиентам AWG

          - Контейнер: {{ awg_container_name }}
          - Таблица: {{ awg_table_name }}
          - Сформирован: {{ ansible_date_time.iso8601 }}

          ## Детализация

          | Клиент | Потратил (RX, MiB) | Отдал (TX, MiB) | Всего (MiB) | Локальная подсеть |
          |---|---:|---:|---:|---|
          {% for row in awg_query.stdout_lines %}
          | {{ row }} |
          {% endfor %}
        dest: "{{ awg_report_output }}"
        mode: "0644"

    - name: Show report location
      ansible.builtin.debug:
        msg: "Report generated: {{ awg_report_output }} (DB: {{ awg_effective_db_path }})"
